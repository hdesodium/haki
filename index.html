<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍈 haki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --bg: #0d0d0f;
  --surface: #141417;
  --surface2: #1c1c21;
  --border: #2a2a32;
  --text: #f0f0f5;
  --muted: #7a7a8a;
  --muted2: #3a3a45;
  --r: 18px;
  --acc: #b8d4f8;
  --glow: rgba(184,212,248,0.30);
  --dim: rgba(184,212,248,0.07);
  --font-d: 'DM Serif Display', serif;
  --font-s: 'DM Sans', sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-s);overflow:hidden;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;overflow:hidden;}
.screen.active{display:flex;}

/* ── HOME SCREEN ── */
#home{background:var(--bg);justify-content:flex-start;padding:0;}
.home-header{width:100%;padding:52px 24px 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.home-logo{font-family:var(--font-d);font-size:2rem;color:var(--acc);letter-spacing:-0.02em;text-shadow:0 0 40px var(--glow);}
.home-sub{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);transition:background 0.3s;}
.sync-dot.ok{background:#2dba5a;}
.sync-dot.err{background:#e05555;}
.sync-dot.syncing{background:var(--acc);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* pipeline cards grid */
.pip-grid{width:100%;padding:8px 16px 0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1;padding-bottom:24px;}

.pip-card{
  width:100%;border-radius:var(--r);
  border:1px solid var(--border);
  background:var(--surface);
  padding:16px;
  display:flex;align-items:center;gap:16px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;overflow:hidden;
}
.pip-card:active{transform:scale(0.98);}
.pip-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 50%, var(--card-dim) 0%, transparent 70%);
  pointer-events:none;
}

.pip-sprite-wrap{
  width:90px;height:90px;flex-shrink:0;
  border-radius:14px;border:1.5px solid var(--card-border);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 20px var(--card-glow);
}
.pip-sprite-wrap img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.change-icon-btn{
  position:absolute;bottom:4px;right:4px;
  width:20px;height:20px;border-radius:6px;
  background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;
  transition:opacity 0.15s;
}
.change-icon-btn:hover{opacity:0.8;}

.pip-info{flex:1;}
.pip-label{font-family:var(--font-d);font-size:1.3rem;color:var(--card-acc);letter-spacing:-0.01em;margin-bottom:4px;}
.pip-steps-count{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.pip-progress-track{background:var(--border);border-radius:2px;height:2px;width:100%;}
.pip-progress-bar{height:2px;border-radius:2px;background:var(--card-acc);transition:width 0.4s;}
.pip-progress-label{font-size:0.6rem;color:var(--muted);margin-top:4px;}

/* recent convos */
.section-title{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted2);padding:0 24px;margin-bottom:8px;margin-top:4px;}
.conv-scroll{display:flex;gap:10px;padding:0 20px;overflow-x:auto;padding-bottom:4px;}
.conv-scroll::-webkit-scrollbar{display:none;}
.conv-chip{
  flex-shrink:0;padding:8px 14px;
  border-radius:9999px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);
  font-size:0.7rem;cursor:pointer;white-space:nowrap;
  transition:all 0.15s;
}
.conv-chip.active{border-color:var(--acc);color:var(--acc);background:var(--dim);}
.conv-chip:active{transform:scale(0.97);}

.new-btn{
  margin:12px 16px 0;width:calc(100% - 32px);
  padding:12px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--muted);font-family:var(--font-s);font-size:0.8rem;
  cursor:pointer;transition:all 0.15s;
}
.new-btn:active{transform:scale(0.98);color:var(--text);}

/* ── SESSION SCREEN ── */
#session{background:var(--bg);justify-content:flex-start;}
.session-nav{
  width:100%;padding:52px 20px 12px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.back-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;color:var(--muted);
  transition:all 0.15s;flex-shrink:0;
}
.back-btn:active{transform:scale(0.92);}
.session-title{font-family:var(--font-d);font-size:1.15rem;color:var(--acc);flex:1;line-height:1.2;}
.session-step-badge{
  padding:4px 10px;border-radius:9999px;
  background:var(--dim);border:1px solid var(--card-border);
  font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--acc);flex-shrink:0;
}

/* progress */
.session-progress{width:100%;padding:0 20px;flex-shrink:0;}
.progress-dots{display:flex;gap:4px;align-items:center;}
.pdot{height:3px;border-radius:2px;background:var(--border);transition:all 0.3s;flex:1;}
.pdot.done{background:var(--acc);}
.pdot.current{background:var(--acc);box-shadow:0 0 6px var(--glow);}

/* step sprite */
.step-sprite-area{
  width:100%;display:flex;justify-content:center;padding:16px 0 8px;
  flex-shrink:0;position:relative;
}
.step-sprite{
  width:110px;height:110px;border-radius:20px;
  border:1.5px solid var(--card-border);
  background:var(--surface2);overflow:hidden;
  box-shadow:0 0 30px var(--card-glow),0 0 60px var(--card-dim);
  display:flex;align-items:center;justify-content:center;
}
.step-sprite img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}

/* prompt area */
.prompt-scroll{flex:1;width:100%;overflow-y:auto;padding:0 20px;}
.prompt-scroll::-webkit-scrollbar{width:2px;}
.prompt-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.step-name-label{
  font-family:var(--font-d);font-size:1.4rem;color:var(--acc);
  margin-bottom:12px;line-height:1.2;
}
.prompt-text{
  font-size:0.92rem;line-height:1.85;color:var(--text);
  white-space:pre-wrap;letter-spacing:0.01em;
}

/* notes */
.notes-section{width:100%;padding:12px 20px;flex-shrink:0;}
.notes-toggle{
  display:flex;align-items:center;gap:8px;
  font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;margin-bottom:0;
  user-select:none;
}
.notes-toggle .chevron{transition:transform 0.2s;font-size:0.55rem;}
.notes-toggle.open .chevron{transform:rotate(180deg);}
.notes-body{display:none;margin-top:10px;}
.notes-body.open{display:block;}
.notes-textarea{
  width:100%;min-height:90px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
  color:var(--text);font-family:var(--font-s);font-size:0.85rem;
  line-height:1.6;resize:none;outline:none;
  transition:border-color 0.15s;
}
.notes-textarea:focus{border-color:var(--card-border);}
.notes-toolbar{display:flex;gap:8px;margin-top:8px;align-items:center;}
.note-mic-btn{
  width:34px;height:34px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;cursor:pointer;transition:all 0.15s;color:var(--muted);
}
.note-mic-btn.recording{border-color:var(--acc);color:var(--acc);background:var(--dim);animation:blink 1s infinite;}
.note-save-btn{
  flex:1;padding:8px;border-radius:9px;
  background:var(--dim);border:1px solid var(--card-border);
  color:var(--acc);font-family:var(--font-s);font-size:0.72rem;
  cursor:pointer;transition:all 0.15s;
}
.note-save-btn:active{transform:scale(0.97);}
.saved-note-preview{
  font-size:0.78rem;color:var(--muted);font-style:italic;
  padding:8px 12px;background:var(--surface);border-radius:10px;
  border-left:2px solid var(--card-border);margin-top:6px;
  white-space:pre-wrap;word-break:break-word;
}

/* nav buttons */
.session-footer{width:100%;padding:8px 20px 28px;display:flex;gap:10px;flex-shrink:0;}
.nav-btn{
  flex:1;padding:14px;border-radius:14px;
  font-family:var(--font-s);font-size:0.82rem;
  cursor:pointer;transition:all 0.18s;
  border:1px solid var(--border);background:var(--surface2);color:var(--muted);
}
.nav-btn.primary{
  background:var(--dim);border-color:var(--card-border);
  color:var(--acc);font-weight:500;
}
.nav-btn:active{transform:scale(0.97);}
.nav-btn:disabled{opacity:0.3;cursor:default;}

/* ── ICON PICKER MODAL ── */
#icon-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:none;align-items:flex-end;justify-content:center;z-index:100;
}
#icon-modal.open{display:flex;}
.icon-modal-box{
  width:100%;background:var(--surface);
  border-radius:24px 24px 0 0;padding:20px 20px 36px;
}
.icon-modal-title{font-family:var(--font-d);font-size:1.1rem;color:var(--text);margin-bottom:16px;}
.icon-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.icon-option{
  width:80px;height:80px;border-radius:14px;
  border:2px solid var(--border);
  background:var(--surface2);overflow:hidden;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.icon-option img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.icon-option.selected{border-color:var(--acc);box-shadow:0 0 16px var(--glow);}
.icon-option:active{transform:scale(0.94);}
.modal-cancel{
  width:100%;margin-top:14px;padding:12px;
  border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-family:var(--font-s);font-size:0.8rem;cursor:pointer;
}

/* transitions */
.screen{transition:opacity 0.2s;}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-header">
    <div>
      <div class="home-sub">journal</div>
      <div class="home-logo">🍈haki</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="sync-dot" id="sync-dot"></div>
      <div style="font-size:0.55rem;color:var(--muted2)" id="sync-label">—</div>
    </div>
  </div>

  <div class="pip-grid" id="pip-grid"></div>

  <div class="section-title">Sessions récentes</div>
  <div class="conv-scroll" id="conv-scroll"></div>
  <button class="new-btn" onclick="newConversation()">+ Nouvelle session</button>
  <div style="height:24px;flex-shrink:0;"></div>
</div>

<!-- SESSION SCREEN -->
<div id="session" class="screen">
  <div class="session-nav">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="session-title" id="session-title">Ultra Instinct</div>
    <div class="session-step-badge" id="step-badge">1/7</div>
  </div>

  <div class="session-progress" id="session-progress" style="margin-bottom:12px;"></div>

  <div class="step-sprite-area">
    <div class="step-sprite" id="step-sprite"><img id="step-sprite-img" src="" alt=""></div>
  </div>

  <div class="prompt-scroll" id="prompt-scroll">
    <div class="step-name-label" id="step-name-el"></div>
    <div class="prompt-text" id="prompt-text-el"></div>
  </div>

  <div class="notes-section">
    <div class="notes-toggle" id="notes-toggle" onclick="toggleNotes()">
      <span>Notes</span><span class="chevron" id="notes-chevron">▼</span>
      <span id="notes-saved-indicator" style="color:var(--acc);font-size:0.55rem;display:none;">● sauvegardé</span>
    </div>
    <div class="notes-body" id="notes-body">
      <textarea class="notes-textarea" id="notes-textarea" placeholder="Tes réflexions sur cette étape…"></textarea>
      <div class="notes-toolbar">
        <button class="note-mic-btn" id="note-mic-btn" onclick="toggleVoiceNote()">🎙</button>
        <div id="voice-note-status" style="font-size:0.65rem;color:var(--muted);flex:1;text-align:center;display:none;"></div>
        <button class="note-save-btn" onclick="saveNote()">Sauvegarder</button>
      </div>
      <div id="saved-note-preview" class="saved-note-preview" style="display:none;"></div>
    </div>
  </div>

  <div class="session-footer">
    <button class="nav-btn" id="prev-btn" onclick="prevStep()">← Précédent</button>
    <button class="nav-btn primary" id="next-btn" onclick="nextStep()">Suivant →</button>
  </div>
</div>

<!-- ICON PICKER MODAL -->
<div id="icon-modal" onclick="closeIconModal(event)">
  <div class="icon-modal-box">
    <div class="icon-modal-title">Choisir une icône</div>
    <div class="icon-grid" id="icon-grid"></div>
    <button class="modal-cancel" onclick="closeIconModal()">Annuler</button>
  </div>
</div>

    { name: "Self-respect", prompt: "Qu\'est-ce que cette situation t\'apprend sur ton self-respect ?\n\nAs-tu respecté tes propres limites ? As-tu dit oui quand tu voulais dire non ? As-tu tu quelque chose d\'important ?\n\nComment aurais-tu pu te respecter davantage ? Comment le feras-tu à l\'avenir ?" },
    { name: "Self-worth", prompt: "Ta valeur propre.\n\nCette situation a-t-elle ébranlé ta perception de ta valeur ? Si oui, sur quoi était-elle basée — sur l\'approbation des autres, sur ta performance, sur les résultats ?\n\nTa valeur est intrinsèque. Elle ne dépend pas de ce qui s\'est passé. Qu\'est-ce que tu sais de toi-même, de façon certaine, indépendamment de cette situation ?" },
    { name: "Apprentissage : SIIU", prompt: "Intègre.\n\nComment peux-tu t\'adapter en restant dans le respect de toi-même et de l\'autre ?\n\nQu\'est-ce que tu crées comme valeur pour toi à travers cette expérience ?\n\nComment cette situation t\'aide-t-elle à construire ton intimité avec toi-même ?\n\nMaturité émotionnelle = conscience de tes états internes + capacité d\'ajustement pour ton bien-être + conscience des états des autres + ajustement pour le bien-être collectif.\n\nOù en es-tu sur cette équation aujourd\'hui ?" },

  circuit_social: [
    { name: "Situation relationnelle", prompt: "Pose le contexte.\n\nDécris la situation relationnelle ou sociale que tu veux observer. Qui est impliqué ? Quel est le contexte ? Que s\'est-il passé exactement ?\n\nReste factuelle et descriptive, sans jugement pour l\'instant." },
    { name: "Dynamiques en jeu", prompt: "Observe les mécanismes.\n\nQuelles dynamiques sont à l\'œuvre dans cette relation ou ce groupe ?\n\nY a-t-il des rôles implicites — qui sauve, qui attaque, qui subit ? Y a-t-il une hiérarchie, une compétition, une dépendance ? Comment les échanges fonctionnent-ils — réciprocité, équité, dette ?\n\nNomme ce que tu observes, sans te positionner moralement." },
    { name: "Patterns comportementaux", prompt: "Tes schémas dans cette dynamique.\n\nComment te comportes-tu habituellement dans ce type de relation ou de situation ?\n\nQuels comportements de ta part se répètent ? Que fais-tu instinctivement — tu te fermes, tu t\'effaces, tu sur-expliques, tu compenses ?\n\nQuel est l\'impact de ces comportements sur toi et sur les autres ?" },
    { name: "Frontières et besoins", prompt: "Tes frontières.\n\nDans cette dynamique, où sont tes frontières ? Sont-elles poreuses — tu te laisses envahir. Rigides — tu te coupes des autres. Flexibles — tu t\'adaptes tout en te respectant.\n\nQuel besoin est frustré ici — autonomie, compétence ou connexion ? Qu\'est-ce que tu cherches vraiment dans cette relation ?" },
    { name: "Ajustements concrets", prompt: "Ce que tu peux faire différemment.\n\nQu\'est-ce qui changerait si tu posais une frontière claire ? Si tu exprimais ton besoin directement plutôt qu\'indirectement ?\n\nQuelle serait l\'observation neutre de la situation ? Le sentiment que ça génère en toi ? Le besoin derrière ce sentiment ? La demande concrète que tu pourrais faire ?\n\nQu\'est-ce que tu peux ajuster dans ton prochain comportement dans cette dynamique ?" },

    { name: "Équation sociale", prompt: "Intègre.\n\nMaturité sociale = (maturité émotionnelle × réflexivité) + exposition + compréhension d\'autrui.\n\nOù en es-tu sur chacune de ces dimensions aujourd\'hui ?\n\nQu\'est-ce que cette expérience sociale t\'a appris que tu peux emporter avec toi ?" },

  salle_du_temps: [

    { name: "Confidences", prompt: "Un gage d\'honnêteté.\n\nPour aller plus loin, tu as besoin de te faire confiance.\n\nQuelle est la chose que tu n\'oses pas tout à fait te dire sur cette situation ? Pas ce que tu dirais à quelqu\'un d\'autre — ce que tu sais, au fond, et que tu évites de regarder en face.\n\nÉcris-la. Sans filtre." },
    { name: "Liste des émotions", prompt: "Nomme ce que tu ressens.\n\nPrends le temps de lister toutes les émotions présentes. Pas juste les grandes — les petites aussi, celles qui se cachent derrière les autres.\n\nPeur. Honte. Tristesse. Colère. Déception. Soulagement. Ambivalence. Culpabilité. Solitude. Fierté malgré tout.\n\nLaquelle est la plus forte ? Laquelle est la plus difficile à admettre ?" },

    { name: "Besoin secondaire", prompt: "Plus précisément.\n\nAu-delà du besoin primaire, quel est le besoin plus spécifique, plus personnel ?\n\nPar exemple : si ton besoin primaire est la connexion, ton besoin secondaire pourrait être d\'être choisie, d\'être écoutée sans être jugée, d\'appartenir à quelque chose de vrai.\n\nNomme ce besoin le plus précisément possible. Il t\'appartient." },
    { name: "Déclencheurs", prompt: "Ce qui a tout mis en mouvement.\n\nQu\'est-ce qui a déclenché cette situation ou cette émotion ?\n\nDans ton monde intérieur — qu\'as-tu pensé ? Qu\'as-tu ressenti physiquement ? Quelle interprétation as-tu faite ?\n\nDans ton comportement extérieur — qu\'as-tu dit ou fait ? Qu\'as-tu évité de dire ou de faire ?\n\nObserve sans te juger." },
    { name: "Schémas répétitifs", prompt: "Le motif qui revient.\n\nEst-ce que tu reconnais quelque chose de familier dans cette situation ?\n\nEst-ce une dynamique que tu as déjà vécue — avec d\'autres personnes, dans d\'autres contextes, à d\'autres moments de ta vie ?\n\nQuel est le schéma ? Comment se manifeste-t-il habituellement ? Quel rôle joues-tu dedans ?" },
    { name: "Croyances limitantes", prompt: "Ce qui te retient.\n\nDerrière ce schéma, il y a une croyance — quelque chose que tu as intégré sur toi, sur les autres ou sur le monde.\n\n« Je dois mériter l\'amour. » « Si je demande, on va me rejeter. » « Je ne suis jamais assez. » « Les autres ne restent pas. »\n\nQuelle est ta croyance ? Dis-la clairement, sans l\'habiller." },

    { name: "Apprentissage : SIIU", prompt: "La synthèse.\n\nComment peux-tu t\'adapter tout en restant dans le respect de toi-même et de l\'autre ?\n\nQu\'est-ce que tu te crées comme valeur à travers cette expérience ?\n\nComment cette traversée construit-elle ton intimité avec toi-même ?\n\nMaturité émotionnelle = conscience de tes états internes + capacité d\'ajustement pour ton bien-être + conscience des états des autres + ajustement pour le bien-être collectif.\n\nLà où tu en es aujourd\'hui sur cette équation — qu\'est-ce que tu vois ?" },

// ── STATE ──
let state = {
  pipeline: "ultra_instinct",
  step: 0,
  convName: null,
  allConvs: [],
  notes: {},         // { stepKey: text }
  iconChoice: {},    // { pipelineKey: spriteKey }
  editingIconPipeline: null,
};

function stepKey(pip, step) { return `${pip}_${step}`; }

function ts() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}-${String(d.getMinutes()).padStart(2,'0')}-${String(d.getSeconds()).padStart(2,'0')}`;
}

function applyTheme(pip) {
  const t = PIPELINE_CONFIG[pip];
  const r = document.documentElement;
  r.style.setProperty('--acc', t.accent);
  r.style.setProperty('--glow', t.glow);
  r.style.setProperty('--dim', t.dim);
  r.style.setProperty('--card-acc', t.accent);
  r.style.setProperty('--card-glow', t.glow);
  r.style.setProperty('--card-dim', t.dim);
  r.style.setProperty('--card-border', t.border);
}

// ── FIREBASE ──
let db = null;
async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, collection, doc, getDocs, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = initializeApp({
      apiKey: "AIzaSyA9M8K9VGejqHCq8S22y2iPzd5rHF3bsBM",
      authDomain: "haki-2a75b.firebaseapp.com",
      projectId: "haki-2a75b",
      storageBucket: "haki-2a75b.firebasestorage.app",
      messagingSenderId: "1096421970989",
      appId: "1:1096421970989:web:451f594188d541f5b554a4"
    });
    db = getFirestore(app);
    window._fs = { collection, doc, getDocs, setDoc, onSnapshot };
    setSyncStatus('ok', 'sync');
    await loadAllConvs();
    renderHome();
  } catch(e) {
    setSyncStatus('err', 'hors ligne');
    renderHome();
  }
}

function setSyncStatus(cls, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + cls;
  document.getElementById('sync-label').textContent = label;
}

async function saveConv() {
  if (!db || !state.convName) return;
  setSyncStatus('syncing', '…');
  try {
    await window._fs.setDoc(window._fs.doc(db, "haki_sessions", state.convName), {
      pipeline: state.pipeline, step: state.step,
      notes: state.notes, iconChoice: state.iconChoice,
      updatedAt: new Date().toISOString()
    });
    setSyncStatus('ok', 'sync');
  } catch(e) { setSyncStatus('err', 'erreur'); }
}

async function loadAllConvs() {
  if (!db) return;
  try {
    const snap = await window._fs.getDocs(window._fs.collection(db, "haki_sessions"));
    state.allConvs = [];
    snap.forEach(d => state.allConvs.push({ id: d.id, ...d.data() }));
    state.allConvs.sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
  } catch(e) {}
}

async function loadConv(name) {
  if (!db) return;
  try {
    const snap = await window._fs.getDocs(window._fs.collection(db, "haki_sessions"));
    let found = null;
    snap.forEach(d => { if (d.id === name) found = d.data(); });
    if (found) {
      state.pipeline = found.pipeline || "ultra_instinct";
      state.step = found.step || 0;
      state.notes = found.notes || {};
      state.iconChoice = found.iconChoice || {};
    }
  } catch(e) {}
}

// ── HOME RENDER ──
function renderHome() {
  const grid = document.getElementById('pip-grid');
  grid.innerHTML = '';
  Object.entries(PIPELINE_CONFIG).forEach(([key, cfg]) => {
    const steps = STEPS[key];
    const iconKey = state.iconChoice[key] || cfg.defaultIcon;
    const card = document.createElement('div');
    card.className = 'pip-card';
    card.style.setProperty('--card-acc', cfg.accent);
    card.style.setProperty('--card-glow', cfg.glow);
    card.style.setProperty('--card-dim', cfg.dim);
    card.style.setProperty('--card-border', cfg.border);
    card.innerHTML = `
      <div class="pip-sprite-wrap" style="--card-glow:${cfg.glow};--card-border:${cfg.border};">
        <img src="${SPRITES[iconKey]}" alt="${cfg.label}" style="image-rendering:pixelated;">
        ${cfg.altIcons.length > 1 ? `<div class="change-icon-btn" onclick="openIconModal(event,'${key}')">⇄</div>` : ''}
      </div>
      <div class="pip-info">
        <div class="pip-label">${cfg.label}</div>
        <div class="pip-steps-count">${steps.length} étapes</div>
        <div class="pip-progress-track"><div class="pip-progress-bar" style="width:${((state.pipeline===key?state.step:0)+1)/steps.length*100}%;background:${cfg.accent};"></div></div>
        <div class="pip-progress-label" style="color:${cfg.accent};">Étape ${state.pipeline===key?state.step+1:1} / ${steps.length}</div>
      </div>
    `;
    card.onclick = (e) => {
      if (e.target.classList.contains('change-icon-btn')) return;
      startSession(key);
    };
    grid.appendChild(card);
  });

  // recent convos
  const scroll = document.getElementById('conv-scroll');
  scroll.innerHTML = '';
  if (state.allConvs.length === 0) {
    scroll.innerHTML = '<div style="font-size:0.7rem;color:var(--muted);padding:8px 4px;">Aucune session</div>';
  }
  state.allConvs.slice(0, 10).forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'conv-chip' + (c.id === state.convName ? ' active' : '');
    chip.textContent = c.id.replace('haki_','').replace(/_/g,' ');
    chip.onclick = async () => {
      state.convName = c.id;
      await loadConv(c.id);
      renderHome();
    };
    scroll.appendChild(chip);
  });
}

// ── SESSION ──
function startSession(pipKey) {
  state.pipeline = pipKey;
  applyTheme(pipKey);
  renderSession();
  showScreen('session');
}

function renderSession() {
  const pip = PIPELINE_CONFIG[state.pipeline];
  const steps = STEPS[state.pipeline];
  const step = steps[state.currentStep()];
  const iconKey = state.iconChoice[state.pipeline] || pip.defaultIcon;

  document.getElementById('session-title').textContent = pip.label;
  document.getElementById('step-badge').textContent = `${state.currentStep()+1}/${steps.length}`;
  document.getElementById('step-sprite-img').src = SPRITES[iconKey];
  document.getElementById('step-name-el').textContent = step.name;
  document.getElementById('prompt-text-el').textContent = step.prompt;

  // dots
  const prog = document.getElementById('session-progress');
  prog.innerHTML = '<div class="progress-dots">' +
    steps.map((_,i) => `<div class="pdot ${i<state.currentStep()?'done':i===state.currentStep()?'current':''}"></div>`).join('') +
    '</div>';

  // nav buttons
  document.getElementById('prev-btn').disabled = state.currentStep() === 0;
  const nextBtn = document.getElementById('next-btn');
  if (state.currentStep() === steps.length - 1) {
    nextBtn.textContent = '✓ Terminer';
    nextBtn.onclick = () => { saveConv(); goHome(); };
  } else {
    nextBtn.textContent = 'Suivant →';
    nextBtn.onclick = nextStep;
  }

  // notes
  const key = stepKey(state.pipeline, state.currentStep());
  const existing = state.notes[key] || '';
  document.getElementById('notes-textarea').value = existing;
  const preview = document.getElementById('saved-note-preview');
  if (existing) { preview.textContent = existing; preview.style.display = 'block'; document.getElementById('notes-saved-indicator').style.display = 'inline'; }
  else { preview.style.display = 'none'; document.getElementById('notes-saved-indicator').style.display = 'none'; }

  // scroll to top
  document.getElementById('prompt-scroll').scrollTop = 0;
}

function currentStep() { return state.step; }
state.currentStep = currentStep;

function nextStep() {
  const steps = STEPS[state.pipeline];
  if (state.step < steps.length - 1) {
    state.step++;
    renderSession();
    saveConv();
  }
}

function prevStep() {
  if (state.step > 0) {
    state.step--;
    renderSession();
  }
}

function goHome() {
  applyTheme("ultra_instinct");
  document.documentElement.style.setProperty('--acc', '#b8d4f8');
  renderHome();
  showScreen('home');
}

// ── NOTES ──
function toggleNotes() {
  const body = document.getElementById('notes-body');
  const toggle = document.getElementById('notes-toggle');
  const chevron = document.getElementById('notes-chevron');
  const open = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
  chevron.textContent = open ? '▲' : '▼';
}

function saveNote() {
  const key = stepKey(state.pipeline, state.step);
  const text = document.getElementById('notes-textarea').value.trim();
  state.notes[key] = text;
  const preview = document.getElementById('saved-note-preview');
  if (text) { preview.textContent = text; preview.style.display = 'block'; document.getElementById('notes-saved-indicator').style.display = 'inline'; }
  else { preview.style.display = 'none'; document.getElementById('notes-saved-indicator').style.display = 'none'; }
  saveConv();
}

// ── VOICE NOTE ──
let speechRec = null, isListening = false;

function toggleVoiceNote() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert("Reconnaissance vocale non disponible sur ce navigateur."); return; }

  if (isListening) {
    speechRec.stop(); return;
  }

  speechRec = new SpeechRecognition();
  speechRec.lang = 'fr-FR'; speechRec.continuous = true; speechRec.interimResults = true;

  const btn = document.getElementById('note-mic-btn');
  const status = document.getElementById('voice-note-status');
  status.style.display = 'block'; status.textContent = 'Parlez…';
  btn.classList.add('recording'); isListening = true;

  speechRec.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (final) {
      const ta = document.getElementById('notes-textarea');
      ta.value = (ta.value ? ta.value + ' ' : '') + final;
    }
    status.textContent = interim || '…';
  };

  speechRec.onerror = () => { btn.classList.remove('recording'); status.style.display = 'none'; isListening = false; };
  speechRec.onend = () => { btn.classList.remove('recording'); status.style.display = 'none'; isListening = false; };
  speechRec.start();
}

// ── ICON PICKER ──
function openIconModal(e, pipKey) {
  e.stopPropagation();
  state.editingIconPipeline = pipKey;
  const cfg = PIPELINE_CONFIG[pipKey];
  const grid = document.getElementById('icon-grid');
  grid.innerHTML = '';
  cfg.altIcons.forEach(iconKey => {
    const div = document.createElement('div');
    div.className = 'icon-option' + ((state.iconChoice[pipKey]||cfg.defaultIcon)===iconKey?' selected':'');
    div.innerHTML = `<img src="${SPRITES[iconKey]}" alt="${iconKey}">`;
    div.onclick = () => {
      state.iconChoice[pipKey] = iconKey;
      closeIconModal();
      renderHome();
      saveConv();
    };
    grid.appendChild(div);
  });
  document.getElementById('icon-modal').classList.add('open');
}

function closeIconModal(e) {
  if (e && e.target !== document.getElementById('icon-modal')) return;
  document.getElementById('icon-modal').classList.remove('open');
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── NEW CONV ──
async function newConversation() {
  state.convName = `haki_${ts()}`;
  state.step = 0;
  state.notes = {};
  await saveConv();
  await loadAllConvs();
  renderHome();
}
window.newConversation = newConversation;
window.goHome = goHome;
window.nextStep = nextStep;
window.prevStep = prevStep;
window.toggleNotes = toggleNotes;
window.saveNote = saveNote;
window.toggleVoiceNote = toggleVoiceNote;
window.openIconModal = openIconModal;
window.closeIconModal = closeIconModal;
window.startSession = startSession;

// ── INIT ──
initFirebase();
</script>
