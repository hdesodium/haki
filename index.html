<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>haki</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0b14;--glass:rgba(255,255,255,0.06);--glass2:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --text:#f4f2ff;--muted:rgba(244,242,255,0.55);--muted2:rgba(244,242,255,0.28);
  --r:18px;--r2:14px;--font-d:'Playfair Display',serif;--font-s:'Nunito',sans-serif;
  --acc:#d4b8ff;--pip-acc:#d4b8ff;--pip-glow:rgba(212,184,255,0.25);
  --pip-dim:rgba(212,184,255,0.09);--pip-border:rgba(212,184,255,0.30);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-s);overflow:hidden;-webkit-font-smoothing:antialiased;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;animation:fadeIn 0.28s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.bg-img{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;}
.bg-vignette{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(13,11,20,0.30) 0%,rgba(13,11,20,0.42) 35%,rgba(13,11,20,0.82) 65%,rgba(13,11,20,0.97) 100%);}
.content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;overflow:hidden;}
.safe-top{height:env(safe-area-inset-top,44px);flex-shrink:0;}
.status-row{display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0;flex-shrink:0;}
.sync-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9999px;background:var(--glass);border:1px solid var(--border);font-size:0.58rem;letter-spacing:0.08em;color:var(--muted);}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(244,242,255,0.28);transition:background 0.3s;}
.sdot.ok{background:#6ee7a0;}.sdot.err{background:#f87171;}
.sdot.syncing{background:var(--acc);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.home-topbar{padding:16px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.home-greeting{font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.home-title{font-family:var(--font-d);font-size:2.6rem;font-weight:400;color:var(--text);line-height:1;}
.home-title span{color:#ffffff;}
.home-settings-btn{width:38px;height:38px;border-radius:12px;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;color:var(--muted);flex-shrink:0;transition:all 0.15s;margin-top:4px;}
.home-settings-btn:active{transform:scale(0.92);}
.pip-scroll{flex:1;overflow-y:auto;padding:0 16px;display:flex;flex-direction:column;gap:9px;padding-bottom:16px;}
.pip-scroll::-webkit-scrollbar{display:none;}
.pip-card{border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;border:1px solid var(--border);background:rgba(13,11,20,0.55);backdrop-filter:blur(10px);transition:transform 0.18s;}
.pip-card:active{transform:scale(0.975);}
.pip-card-body{position:relative;z-index:2;padding:12px 14px 11px;display:flex;flex-direction:column;gap:9px;}
.pip-card-top{display:flex;align-items:center;gap:12px;}
.pip-card-info{flex:1;min-width:0;}
.pip-card-label{font-size:0.95rem;font-weight:700;line-height:1.2;color:var(--text);}
.pip-card-sub{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.pip-icon-wrap{width:52px;height:52px;border-radius:12px;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border2);background:rgba(13,11,20,0.55);box-shadow:0 3px 14px var(--pip-glow);position:relative;}
.pip-icon-wrap img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.icon-swap-btn{position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:4px;background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:7px;cursor:pointer;color:#fff;}
.pip-card-bottom{display:flex;align-items:center;gap:10px;}
.pip-prog-track{flex:1;height:2px;background:rgba(255,255,255,0.10);border-radius:1px;}
.pip-prog-fill{height:2px;border-radius:1px;transition:width 0.4s;}
.pip-prog-label{font-size:0.58rem;color:var(--muted);white-space:nowrap;}
.home-section{padding:0 22px;flex-shrink:0;}
.section-ttl{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.chips-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;}
.chips-row::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:9999px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:0.68rem;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.chip.active{border-color:var(--pip-acc);color:var(--pip-acc);background:var(--pip-dim);}
.chip:active{transform:scale(0.95);}
.home-footer{padding:12px 16px 28px;flex-shrink:0;}
.new-btn{width:100%;padding:14px;border-radius:var(--r2);background:var(--glass2);border:1px solid var(--border2);color:var(--text);font-size:0.82rem;font-weight:600;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;backdrop-filter:blur(8px);}
.new-btn:active{transform:scale(0.98);}
#settings-panel{position:fixed;inset:0;z-index:150;display:none;align-items:flex-end;background:rgba(13,11,20,0.7);backdrop-filter:blur(12px);}
#settings-panel.open{display:flex;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.settings-box{width:100%;background:#1a1726;border-radius:28px 28px 0 0;border-top:1px solid var(--border2);padding:20px 20px 36px;max-height:80vh;overflow-y:auto;}
.settings-box::-webkit-scrollbar{display:none;}
.settings-ttl{font-family:var(--font-d);font-size:1.3rem;font-weight:400;color:var(--text);margin-bottom:4px;}
.settings-sub{font-size:0.65rem;color:var(--muted);margin-bottom:18px;}
.settings-section-ttl{font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;margin-top:16px;}
.bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.bg-opt{aspect-ratio:9/16;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.15s;position:relative;}
.bg-opt img{width:100%;height:100%;object-fit:cover;}
.bg-opt.sel{border-color:var(--pip-acc);box-shadow:0 0 14px var(--pip-glow);}
.bg-opt:active{transform:scale(0.94);}
.bg-opt-check{position:absolute;bottom:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--pip-acc);display:none;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:700;}
.bg-opt.sel .bg-opt-check{display:flex;}
.settings-close{width:100%;margin-top:18px;padding:12px;border-radius:14px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:0.8rem;cursor:pointer;}
#session .bg-img{background-image:none !important;background:#0d0b14;}
#session .bg-vignette{background:none;}
.session-topbar{display:flex;align-items:center;gap:12px;padding:10px 18px 8px;flex-shrink:0;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;color:var(--muted);flex-shrink:0;backdrop-filter:blur(6px);transition:all 0.15s;}
.back-btn:active{transform:scale(0.9);}
.session-pip-label{font-family:var(--font-d);font-size:1rem;font-weight:400;flex:1;color:var(--pip-acc);}
.step-pill{padding:4px 11px;border-radius:9999px;background:var(--pip-dim);border:1px solid var(--pip-border);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--pip-acc);flex-shrink:0;}
.dots-wrap{padding:0 18px 12px;flex-shrink:0;}
.dots{display:flex;gap:4px;}
.dot{height:3px;flex:1;border-radius:2px;background:rgba(255,255,255,0.10);transition:all 0.32s;}
.dot.done{background:var(--pip-acc);opacity:0.45;}
.dot.cur{background:var(--pip-acc);box-shadow:0 0 7px var(--pip-glow);}
.hero-card{margin:0 18px;border-radius:var(--r);overflow:hidden;height:160px;flex-shrink:0;position:relative;border:1px solid var(--border2);}
.hero-card-bg{position:absolute;inset:0;background-size:cover;background-position:center 30%;filter:brightness(0.72) saturate(1.1);}
.hero-card-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(13,11,20,0.80) 100%);}
.hero-bg-swap{position:absolute;top:10px;right:10px;z-index:3;width:28px;height:28px;border-radius:8px;background:rgba(13,11,20,0.65);border:1px solid rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:0.7rem;cursor:pointer;color:rgba(255,255,255,0.75);backdrop-filter:blur(4px);transition:all 0.15s;}
.hero-bg-swap:active{transform:scale(0.9);}
.hero-card-content{position:relative;z-index:2;height:100%;display:flex;align-items:flex-end;padding:14px 16px;gap:12px;}
.hero-icon{width:52px;height:52px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border2);flex-shrink:0;box-shadow:0 4px 16px var(--pip-glow);}
.hero-icon img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.hero-step-num{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--pip-acc);opacity:0.8;margin-bottom:2px;}
.hero-step-name{font-family:var(--font-d);font-size:1.1rem;font-weight:400;color:var(--text);line-height:1.2;}
.prompt-scroll{flex:1;overflow-y:auto;padding:14px 18px 0;}
.prompt-scroll::-webkit-scrollbar{width:2px;}
.prompt-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.prompt-text{font-size:0.9rem;line-height:1.9;color:rgba(244,242,255,0.84);white-space:pre-wrap;font-weight:300;}
.notes-wrap{padding:10px 18px;flex-shrink:0;}
.notes-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;cursor:pointer;}
.notes-lbl{font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;}
.note-dot{width:5px;height:5px;border-radius:50%;background:var(--pip-acc);display:none;}
.notes-chev{font-size:0.52rem;color:var(--muted2);transition:transform 0.2s;}
.notes-chev.open{transform:rotate(180deg);}
.notes-body{display:none;padding-top:8px;}
.notes-body.open{display:block;}
.note-ta{width:100%;min-height:78px;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-size:0.85rem;font-weight:300;line-height:1.65;resize:none;outline:none;transition:border-color 0.15s;backdrop-filter:blur(4px);}
.note-ta:focus{border-color:var(--pip-border);}
.note-ta::placeholder{color:var(--muted2);}
.note-actions{display:flex;gap:8px;margin-top:8px;}
.note-mic-btn{width:34px;height:34px;border-radius:9px;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.85rem;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.note-mic-btn.rec{border-color:var(--pip-acc);color:var(--pip-acc);background:var(--pip-dim);}
.note-save-btn{flex:1;padding:8px;border-radius:9px;background:var(--pip-dim);border:1px solid var(--pip-border);color:var(--pip-acc);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.note-save-btn:active{transform:scale(0.97);}
.voice-hint{font-size:0.62rem;color:var(--muted);text-align:center;padding:4px 0;display:none;}
.saved-note-preview{font-size:0.78rem;color:var(--muted);font-weight:300;padding:8px 12px;margin-top:6px;background:var(--glass);border-radius:10px;border-left:2px solid var(--pip-acc);white-space:pre-wrap;word-break:break-word;display:none;}
/* chat button row */
.chat-btn-row{padding:0 18px 6px;flex-shrink:0;}
.chat-open-btn{width:100%;padding:10px 14px;border-radius:12px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:0.74rem;font-weight:600;letter-spacing:0.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.15s;backdrop-filter:blur(4px);}
.chat-open-btn:active{transform:scale(0.98);background:var(--glass2);}
.session-footer{display:flex;gap:10px;padding:6px 18px 28px;flex-shrink:0;}
.foot-btn{flex:1;padding:13px;border-radius:var(--r2);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.18s;background:var(--glass);border:1px solid var(--border);color:var(--muted);backdrop-filter:blur(6px);}
.foot-btn.primary{background:var(--pip-dim);border-color:var(--pip-border);color:var(--pip-acc);}
.foot-btn:disabled{opacity:0.28;pointer-events:none;}
.foot-btn:active{transform:scale(0.97);}
#icon-picker{position:fixed;inset:0;z-index:200;background:rgba(13,11,20,0.78);backdrop-filter:blur(14px);display:none;align-items:flex-end;}
#icon-picker.open{display:flex;animation:slideUp 0.28s ease;}
.picker-box{width:100%;background:#1c1828;border-radius:28px 28px 0 0;border-top:1px solid var(--border2);padding:20px 20px 36px;}
.picker-ttl{font-family:var(--font-d);font-size:1.15rem;font-weight:400;color:var(--text);margin-bottom:16px;}
.picker-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.picker-opt{width:76px;height:76px;border-radius:16px;overflow:hidden;border:2px solid var(--border);background:var(--glass2);cursor:pointer;transition:all 0.15s;}
.picker-opt img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated;}
.picker-opt.sel{border-color:var(--pip-acc);box-shadow:0 0 14px var(--pip-glow);}
.picker-opt:active{transform:scale(0.93);}
.picker-cancel{width:100%;margin-top:14px;padding:12px;border-radius:12px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:0.8rem;cursor:pointer;}
#bg-picker{position:fixed;inset:0;z-index:200;background:rgba(13,11,20,0.82);backdrop-filter:blur(14px);display:none;align-items:flex-end;}
#bg-picker.open{display:flex;animation:slideUp 0.28s ease;}
.bg-picker-box{width:100%;background:#1c1828;border-radius:28px 28px 0 0;border-top:1px solid var(--border2);padding:20px 20px 36px;max-height:72vh;overflow-y:auto;}
.bg-picker-box::-webkit-scrollbar{display:none;}
.bg-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.bg-picker-opt{aspect-ratio:9/16;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.15s;position:relative;}
.bg-picker-opt img{width:100%;height:100%;object-fit:cover;}
.bg-picker-opt.sel{border-color:var(--pip-acc);box-shadow:0 0 12px var(--pip-glow);}
.bg-picker-opt:active{transform:scale(0.93);}
.bg-picker-check{position:absolute;bottom:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--pip-acc);display:none;align-items:center;justify-content:center;font-size:8px;color:#000;font-weight:700;}
.bg-picker-opt.sel .bg-picker-check{display:flex;}
/* ── CHAT PANEL ── */
#chat-panel{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;background:var(--bg);}
#chat-panel.open{display:flex;animation:fadeIn 0.25s ease;}
.chat-topbar{display:flex;align-items:center;gap:12px;padding:10px 18px 10px;flex-shrink:0;background:rgba(13,11,20,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.chat-header-info{flex:1;min-width:0;}
.chat-pip-name{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--pip-acc);margin-bottom:1px;}
.chat-step-name{font-family:var(--font-d);font-size:1rem;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-clear-btn{padding:5px 12px;border-radius:9999px;background:var(--glass);border:1px solid var(--border);color:var(--muted);font-size:0.6rem;font-weight:600;letter-spacing:0.08em;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.chat-clear-btn:active{transform:scale(0.95);}
#chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
#chat-messages::-webkit-scrollbar{width:2px;}
#chat-messages::-webkit-scrollbar-thumb{background:var(--border);}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.assistant{align-items:flex-start;}
.msg-bubble{
  max-width:84%;padding:11px 15px;font-size:0.87rem;line-height:1.75;
  font-weight:300;white-space:pre-wrap;word-break:break-word;
}
.msg-wrap.user .msg-bubble{
  background:var(--glass2);border:1px solid var(--border2);
  border-radius:18px 18px 4px 18px;color:var(--text);
}
.msg-wrap.assistant .msg-bubble{
  background:var(--pip-dim);border:1px solid var(--pip-border);
  border-radius:18px 18px 18px 4px;color:var(--text);
}
.msg-wrap.assistant.thinking .msg-bubble{
  color:var(--muted);font-style:italic;font-size:0.78rem;
}
.chat-input-row{
  display:flex;gap:8px;align-items:flex-end;
  padding:10px 16px 30px;flex-shrink:0;
  background:rgba(13,11,20,0.85);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}
#chat-input{
  flex:1;background:var(--glass);border:1px solid var(--border);
  border-radius:20px;padding:11px 16px;color:var(--text);
  font-family:var(--font-s);font-size:0.87rem;font-weight:300;
  line-height:1.5;resize:none;outline:none;max-height:110px;
  transition:border-color 0.15s;
}
#chat-input:focus{border-color:var(--pip-border);}
#chat-input::placeholder{color:var(--muted2);}
.chat-send{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--pip-dim);border:1px solid var(--pip-border);
  color:var(--pip-acc);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.chat-send:active{transform:scale(0.92);}
.chat-send:disabled{opacity:0.35;pointer-events:none;}
/* voice in chat */
.chat-mic{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--glass);border:1px solid var(--border);
  color:var(--muted);font-size:0.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.chat-mic.rec{border-color:var(--pip-acc);color:var(--pip-acc);background:var(--pip-dim);}
.chat-mic:active{transform:scale(0.92);}
</style>
</head>
<body>
<!-- HOME -->
<div id="home" class="screen active">
  <div class="bg-img" id="home-bg"></div>
  <div class="bg-vignette"></div>
  <div class="content">
    <div class="safe-top"></div>
    <div class="status-row">
      <div id="date-lbl" style="font-size:0.65rem;color:var(--muted);"></div>
      <div class="sync-pill"><div class="sdot" id="sdot"></div><span id="slbl">—</span></div>
    </div>
    <div class="home-topbar">
      <div>
        <div class="home-greeting">Bienvenue</div>
        <div class="home-title">🍈<span>haki</span></div>
      </div>
      <button class="home-settings-btn" onclick="openSettings()">⚙</button>
    </div>
    <div style="height:14px;flex-shrink:0;"></div>
    <div class="pip-scroll" id="pip-list"></div>
    <div class="home-section" style="margin-top:10px;margin-bottom:8px;">
      <div class="section-ttl">Sessions récentes</div>
      <div class="chips-row" id="conv-chips"></div>
    </div>
    <div class="home-footer">
      <button class="new-btn" onclick="newSession()">+ Nouvelle session</button>
    </div>
  </div>
</div>
<!-- SESSION -->
<div id="session" class="screen">
  <div class="bg-img" id="session-bg"></div>
  <div class="bg-vignette"></div>
  <div class="content">
    <div class="safe-top"></div>
    <div class="session-topbar">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="session-pip-label" id="s-pip-lbl"></div>
      <div class="step-pill" id="s-step-pill"></div>
    </div>
    <div class="dots-wrap"><div class="dots" id="dots"></div></div>
    <div class="hero-card">
      <div class="hero-card-bg" id="hero-card-bg"></div>
      <div class="hero-card-grad"></div>

      {name:"Observation",prompt:"Observe ce que tu ressens.\n\nQuelles émotions sont présentes en ce moment ? Nomme-les avec précision : est-ce de la tristesse, de la colère, de la honte, de la peur, de la frustration ?\n\nQuel est ton besoin primaire ?\n— Autonomie : liberté, contrôle de ta vie, indépendance.\n— Compétence : te sentir capable, efficace, à la hauteur.\n— Connexion : appartenir, être comprise, être aimée.\n\nQuel besoin secondaire, plus personnel, découle de ce besoin primaire ?"},

      {name:"Adaptation",prompt:"Reformule et adapte.\n\nComment pourrais-tu reformuler ta croyance limitante en quelque chose de plus aidant, sans te mentir ?\n\nDans cette situation, quelle est ta responsabilité réelle ? Qu'est-ce qui n'est pas de ton ressort ?\n\nQu'est-ce que tu peux concrètement ajuster dans ton comportement, tes mots ou tes attentes ?",mode:'social'},
      {name:"Self-respect",prompt:"Qu'est-ce que cette situation t'apprend sur ton self-respect ?\n\nAs-tu respecté tes propres limites ? As-tu dit oui quand tu voulais dire non ? As-tu tu quelque chose d'important ?\n\nComment aurais-tu pu te respecter davantage ? Comment le feras-tu à l'avenir ?",mode:'social'},

  circuit_social:{
    label:'Social',acc:'#fda4af',glow:'rgba(253,164,175,0.25)',dim:'rgba(253,164,175,0.09)',border:'rgba(253,164,175,0.32)',

    steps:[
      {name:"Situation relationnelle",prompt:"Pose le contexte.\n\nDécris la situation relationnelle ou sociale que tu veux observer. Qui est impliqué ? Quel est le contexte ? Que s'est-il passé exactement ?\n\nReste factuelle et descriptive, sans jugement pour l'instant."},
      {name:"Dynamiques en jeu",prompt:"Observe les mécanismes.\n\nQuelles dynamiques sont à l'œuvre dans cette relation ou ce groupe ?\n\nY a-t-il des rôles implicites — qui sauve, qui attaque, qui subit ? Y a-t-il une hiérarchie, une compétition, une dépendance ? Comment les échanges fonctionnent-ils — réciprocité, équité, dette ?\n\nNomme ce que tu observes, sans te positionner moralement."},

      {name:"Reformulation",prompt:"Transformer sans se mentir.\n\nTa croyance a une histoire — elle t'a probablement protégée à un moment. Mais est-elle encore vraie aujourd'hui ?\n\nComment pourrais-tu la reformuler d'une façon qui soit à la fois plus aidante et honnête ?\n\nPas une affirmation positive forcée — une vérité plus nuancée, plus complète, plus juste."},
      {name:"Responsabilités",prompt:"Ce qui t'appartient.\n\nDans cette situation, qu'est-ce qui est réellement de ta responsabilité ?\n\nEt qu'est-ce qui ne l'est pas — qu'est-ce que tu portes qui appartient à quelqu'un d'autre ?\n\nDéposer ce qui n'est pas le tien n'est pas fuir. C'est de la clarté.",mode:'social'},
      {name:"Adaptation",prompt:"Ce que tu peux faire.\n\nMaintenant que tu as vu la situation plus clairement, qu'est-ce que tu peux concrètement ajuster ?\n\nPas de grands changements radicaux — des petits ajustements réels, ancrés dans ce que tu viens de comprendre.\n\nQu'est-ce que tu vas faire différemment demain ?",mode:'social'},
      {name:"Self-respect",prompt:"Le respect de toi-même.\n\nComment cette expérience t'a-t-elle appris quelque chose sur le self-respect ?\n\nAs-tu posé tes limites ? As-tu agi en accord avec tes valeurs ? As-tu dit ce qui était vrai pour toi ?\n\nComment vas-tu te respecter davantage à l'avenir, concrètement ?",mode:'social'},
      {name:"Self-worth",prompt:"Ta valeur propre.\n\nTa valeur ne se prouve pas et ne se perd pas. Elle est.\n\nQu'est-ce que cette situation t'a appris sur la façon dont tu perçois ta propre valeur ?\n\nSur quoi as-tu tendance à baser ta valeur — le regard des autres, tes performances, tes relations ?\n\nQu'est-ce que tu sais de toi-même qui reste vrai, quoi qu'il arrive ?"},

  },

    const card=document.createElement('div');card.className='pip-card';
    card.innerHTML=`
      <div class="pip-card-body">
        <div class="pip-card-top">
          <div class="pip-icon-wrap" style="border-color:${cfg.border};box-shadow:0 3px 14px ${cfg.glow};">
            <img src="${iconSrc(key)}" alt="">
            ${cfg.icons.alts.length>1?`<div class="icon-swap-btn" onclick="openIconPicker(event,'${key}')">⇄</div>`:''}
          </div>
          <div class="pip-card-info">
            <div class="pip-card-label" style="color:${cfg.acc};">${cfg.label}</div>
            <div class="pip-card-sub">${steps.length} étapes</div>
          </div>
        </div>
        <div class="pip-card-bottom">
          <div class="pip-prog-track"><div class="pip-prog-fill" style="width:${progress}%;background:${cfg.acc};"></div></div>
          <div class="pip-prog-label" style="color:${cfg.acc};">${stepLbl}</div>
        </div>
      </div>`;
    card.onclick=e=>{if(e.target.classList.contains('icon-swap-btn'))return;startSession(key);};
    list.appendChild(card);
  });
  const chips=document.getElementById('conv-chips');chips.innerHTML='';
  if(!S.allConvs.length){chips.innerHTML='<div style="font-size:0.7rem;color:var(--muted2);padding:6px 0;">Aucune session</div>';return;}
  S.allConvs.slice(0,10).forEach(c=>{
    const ch=document.createElement('div');ch.className='chip'+(c.id===S.convName?' active':'');
    ch.textContent=c.id.replace('haki_','').replace(/_/g,' ');
    ch.onclick=async()=>{S.convName=c.id;await loadConv(c.id);renderHome();};
    chips.appendChild(ch);
  });
}

function startSession(pipKey){S.pipeline=pipKey;applyTheme(pipKey);renderSession();showScreen('session');}
function renderSession(){
  const cfg=pip(),step=cfg.steps[S.step];
  document.getElementById('s-pip-lbl').textContent=cfg.label;
  document.getElementById('s-pip-lbl').style.color=cfg.acc;
  document.getElementById('s-step-pill').textContent=`${S.step+1} / ${cfg.steps.length}`;
  document.getElementById('session-bg').style.backgroundImage='none';
  document.getElementById('hero-card-bg').style.backgroundImage=`url('${bgSrc(bgFor(S.pipeline))}')`;
  document.getElementById('hero-icon-img').src=iconSrc(S.pipeline);
  document.getElementById('hero-step-num').textContent=`Étape ${S.step+1} / ${cfg.steps.length}`;
  document.getElementById('hero-step-name').textContent=step.name;
  document.getElementById('dots').innerHTML=cfg.steps.map((_,i)=>`<div class="dot ${i<S.step?'done':i===S.step?'cur':''}"></div>`).join('');
  document.getElementById('prompt-text').textContent=step.prompt;
  document.querySelector('.prompt-scroll').scrollTop=0;
  const nb=document.getElementById('next-btn');
  document.getElementById('prev-btn').disabled=S.step===0;
  if(S.step===cfg.steps.length-1){nb.textContent='✓ Terminer';nb.onclick=()=>{saveSession();goHome();};}
  else{nb.textContent='Suivant →';nb.onclick=nextStep;}
  const key=`${S.pipeline}_${S.step}`,existing=S.notes[key]||'';
  document.getElementById('note-ta').value=existing;
  const prev=document.getElementById('saved-note-preview'),dot=document.getElementById('note-dot');
  if(existing){prev.textContent=existing;prev.style.display='block';dot.style.display='block';}
  else{prev.style.display='none';dot.style.display='none';}
  document.getElementById('notes-body').classList.remove('open');
  document.getElementById('notes-chev').classList.remove('open');
  // reset chat history on step change
  chatHistory=[];
}
window.nextStep=function(){const cfg=pip();if(S.step<cfg.steps.length-1){S.step++;renderSession();saveSession();}};
window.prevStep=function(){if(S.step>0){S.step--;renderSession();}};
window.goHome=function(){applyTheme('ultra_instinct');renderHome();showScreen('home');};
window.newSession=async function(){S.convName=`haki_${ts()}`;S.step=0;S.notes={};S.pipeline='ultra_instinct';await saveSession();await loadConvs();renderHome();};

window.toggleNotes=function(){const b=document.getElementById('notes-body'),c=document.getElementById('notes-chev');const o=b.classList.toggle('open');c.classList.toggle('open',o);};
window.saveNote=function(){
  const key=`${S.pipeline}_${S.step}`,txt=document.getElementById('note-ta').value.trim();
  S.notes[key]=txt;
  const prev=document.getElementById('saved-note-preview'),dot=document.getElementById('note-dot');
  if(txt){prev.textContent=txt;prev.style.display='block';dot.style.display='block';}
  else{prev.style.display='none';dot.style.display='none';}
  saveSession();
};

let recog=null,listening=false;
window.toggleVoice=function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Non supporté sur ce navigateur.');return;}
  if(listening){recog.stop();return;}
  recog=new SR();recog.lang='fr-FR';recog.continuous=true;recog.interimResults=true;
  const mic=document.getElementById('note-mic'),hint=document.getElementById('voice-hint');
  hint.style.display='block';hint.textContent='Parlez…';mic.classList.add('rec');listening=true;
  recog.onresult=e=>{
    let fin='',inter='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else inter+=e.results[i][0].transcript;}
    if(fin){const ta=document.getElementById('note-ta');ta.value=(ta.value?ta.value+' ':'')+fin;}
    hint.textContent=inter||'…';
  };
  recog.onerror=()=>{mic.classList.remove('rec');hint.style.display='none';listening=false;};
  recog.onend=()=>{mic.classList.remove('rec');hint.style.display='none';listening=false;};
  recog.start();
};

window.openSettings=function(){
  const grid=document.getElementById('home-bg-grid');grid.innerHTML='';
  ALL_FONDS.forEach(f=>{
    const div=document.createElement('div');div.className='bg-opt'+(S.homeBg===f?' sel':'');
    div.innerHTML=`<img src="${bgSrc(f)}" loading="lazy"><div class="bg-opt-check">✓</div>`;
    div.onclick=()=>{S.homeBg=f;document.getElementById('home-bg').style.backgroundImage=`url('${bgSrc(f)}')`;document.querySelectorAll('.bg-opt').forEach(o=>o.classList.remove('sel'));div.classList.add('sel');savePrefs();};
    grid.appendChild(div);
  });
  document.getElementById('settings-panel').classList.add('open');
};
window.closeSettings=function(){document.getElementById('settings-panel').classList.remove('open');};
window.maybeCloseSettings=function(e){if(e.target===document.getElementById('settings-panel'))closeSettings();};

window.openIconPicker=function(e,pipKey){
  e.stopPropagation();S.editingPip=pipKey;applyTheme(pipKey);
  const grid=document.getElementById('picker-grid');grid.innerHTML='';
  PIPELINES[pipKey].icons.alts.forEach(name=>{
    const div=document.createElement('div');div.className='picker-opt'+(iconFor(pipKey)===name?' sel':'');
    div.innerHTML=`<img src="${ICON(name)}" alt="">`;
    div.onclick=()=>{S.iconChoice[pipKey]=name;closeIconPicker();renderHome();savePrefs();};
    grid.appendChild(div);
  });
  document.getElementById('icon-picker').classList.add('open');
};
window.closeIconPicker=function(){document.getElementById('icon-picker').classList.remove('open');};
window.maybeCloseIconPicker=function(e){if(e.target===document.getElementById('icon-picker'))closeIconPicker();};

window.openBgPicker=function(){
  const grid=document.getElementById('bg-picker-grid');grid.innerHTML='';
  const current=bgFor(S.pipeline);
  ALL_FONDS.forEach(f=>{
    const div=document.createElement('div');div.className='bg-picker-opt'+(current===f?' sel':'');
    div.innerHTML=`<img src="${bgSrc(f)}" loading="lazy"><div class="bg-picker-check">✓</div>`;
    div.onclick=()=>{S.pipBgChoice[S.pipeline]=f;document.getElementById('hero-card-bg').style.backgroundImage=`url('${bgSrc(f)}')`;closeBgPicker();savePrefs();};
    grid.appendChild(div);
  });
  document.getElementById('bg-picker').classList.add('open');
};
window.closeBgPicker=function(){document.getElementById('bg-picker').classList.remove('open');};
window.maybeCloseBgPicker=function(e){if(e.target===document.getElementById('bg-picker'))closeBgPicker();};

// ── CHAT ──
let chatHistory=[];
let chatStreaming=false;
let chatRecog=null,chatListening=false;

function getStepMode(){
  const step=pip().steps[S.step];
  return step.mode || pip().mode || 'emotional';
}
function buildSystemPrompt(){
  const mode=getStepMode();
  const base=mode==='social'?SYSTEM_SOCIAL:SYSTEM_EMOTIONAL;
  const step=pip().steps[S.step];
  const now=new Date();
  const j=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const m=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  return `${base}

---
Date : ${j[now.getDay()]} ${now.getDate()} ${m[now.getMonth()]} ${now.getFullYear()}
Pipeline : ${pip().label}
Étape : ${step.name}

Objectif de l'étape :
${step.prompt}

Reste strictement focalisé sur cette étape.`;
}

window.openChat=function(){
  const step=pip().steps[S.step];
  document.getElementById('chat-pip-name').textContent=pip().label;
  document.getElementById('chat-pip-name').style.color=pip().acc;
  document.getElementById('chat-step-name-lbl').textContent=step.name;
  applyTheme(S.pipeline);
  if(chatHistory.length===0){
    const intro={role:'assistant',content:`Je suis là pour cette étape.\n\nPar où veux-tu commencer ?`};
    chatHistory.push(intro);
    renderChatMsgs();
  }
  document.getElementById('chat-panel').classList.add('open');
  setTimeout(()=>document.getElementById('chat-input').focus(),150);
};
window.closeChat=function(){document.getElementById('chat-panel').classList.remove('open');};
window.clearChat=function(){chatHistory=[];document.getElementById('chat-messages').innerHTML='';};

function renderChatMsgs(){
  const el=document.getElementById('chat-messages');
  el.innerHTML='';
  chatHistory.forEach(m=>appendBubble(m,false));
  el.scrollTop=el.scrollHeight;
}

function appendBubble(msg,scroll=true){
  const el=document.getElementById('chat-messages');
  const wrap=document.createElement('div');
  wrap.className=`msg-wrap ${msg.role}`;
  const bubble=document.createElement('div');
  bubble.className='msg-bubble';
  bubble.textContent=msg.content;
  wrap.appendChild(bubble);
  el.appendChild(wrap);
  if(scroll)el.scrollTop=el.scrollHeight;
  return bubble;
}

window.sendChat=async function(){
  if(chatStreaming)return;
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  const userMsg={role:'user',content:text};
  chatHistory.push(userMsg);
  appendBubble(userMsg);
  chatStreaming=true;
  document.getElementById('chat-send-btn').disabled=true;
  const assistantMsg={role:'assistant',content:''};
  chatHistory.push(assistantMsg);
  const bubble=appendBubble(assistantMsg);
  bubble.textContent='…';
  try{
    const messages=[
      {role:'system',content:buildSystemPrompt()},
      ...chatHistory.slice(6)
    ];
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({model:GROQ_MODEL,messages,stream:true,max_tokens:800,temperature:0.72})
    });
    if(!resp.ok){const err=await resp.text();throw new Error(err);}
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    bubble.textContent='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();if(data==='[DONE]')break;
        try{const j=JSON.parse(data);const delta=j.choices?.[0]?.delta?.content||'';if(delta){assistantMsg.content+=delta;bubble.textContent=assistantMsg.content;document.getElementById('chat-messages').scrollTop=document.getElementById('chat-messages').scrollHeight;}}catch(e){}
      }
    }
  }catch(e){
    assistantMsg.content='❌ '+e.message;bubble.textContent=assistantMsg.content;
  }
  chatStreaming=false;
  document.getElementById('chat-send-btn').disabled=false;
};

window.toggleChatVoice=function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Non supporté sur ce navigateur.');return;}
  if(chatListening){chatRecog.stop();return;}
  chatRecog=new SR();chatRecog.lang='fr-FR';chatRecog.continuous=true;chatRecog.interimResults=true;
  const btn=document.getElementById('chat-mic-btn');
  btn.classList.add('rec');chatListening=true;
  chatRecog.onresult=e=>{
    let fin='',inter='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else inter+=e.results[i][0].transcript;}
    const inp=document.getElementById('chat-input');
    if(fin){inp.value=(inp.value?inp.value+' ':'')+fin;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px';}
    else if(inter){inp.placeholder=inter;}
  };
  chatRecog.onerror=()=>{btn.classList.remove('rec');chatListening=false;};
  chatRecog.onend=()=>{btn.classList.remove('rec');chatListening=false;document.getElementById('chat-input').placeholder='Écris ici…';};
  chatRecog.start();
};

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
initFB();
